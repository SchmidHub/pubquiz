<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PubQuiz</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .start-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: calc(100vh - 52px);
      gap: 3rem; text-align: center; padding: 2rem;
    }
    .start-heading { display: flex; flex-direction: column; gap: 0.5rem; align-items: center; }
    .start-heading h1 {
      font-size: 2rem; font-weight: 600; letter-spacing: -0.03em;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .start-heading h1 svg { color: var(--accent); }
    .start-heading p { color: var(--text-muted); font-size: 0.9rem; }
    .role-cards { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .role-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.75rem 2rem;
      text-decoration: none; color: var(--text);
      transition: border-color 0.15s, transform 0.15s;
      min-width: 200px; display: flex; flex-direction: column;
      align-items: center; gap: 0.85rem; text-align: center;
    }
    .role-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .role-card .icon svg { color: var(--accent); }
    .role-card h2 { font-size: 0.95rem; font-weight: 600; }
    .role-card p  { font-size: 0.82rem; color: var(--text-muted); line-height: 1.45; max-width: 180px; }
  </style>
</head>
<body>
<header>
  <div class="logo">
    <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 9c0 3.9-3.6 7-8 7a9.3 9.3 0 01-3-.5L2 17l1.5-3.8A6.8 6.8 0 012 9c0-3.9 3.6-7 8-7s8 3.1 8 7z"/>
      <path d="M8 6.5a2 2 0 013.7 1c0 1.3-1.7 1.8-1.7 3"/>
      <circle cx="10" cy="12.5" r="0.6" fill="currentColor" stroke="none"/>
    </svg>
    PubQuiz
  </div>
  <div class="header-right">
    <button class="theme-toggle" id="themeToggle" title="Theme wechseln">
      <svg id="iconSun" width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="7.5" cy="7.5" r="2.5"/>
        <line x1="7.5" y1="1" x2="7.5" y2="2.5"/><line x1="7.5" y1="12.5" x2="7.5" y2="14"/>
        <line x1="1" y1="7.5" x2="2.5" y2="7.5"/><line x1="12.5" y1="7.5" x2="14" y2="7.5"/>
        <line x1="3" y1="3" x2="4.1" y2="4.1"/><line x1="10.9" y1="10.9" x2="12" y2="12"/>
        <line x1="12" y1="3" x2="10.9" y2="4.1"/><line x1="4.1" y1="10.9" x2="3" y2="12"/>
      </svg>
      <svg id="iconMoon" width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <path d="M13 9.5a6 6 0 01-7.5-7.5A5.5 5.5 0 1013 9.5z" fill="currentColor" stroke="none"/>
      </svg>
    </button>
  </div>
</header>

<div class="start-screen">
  <div class="start-heading">
    <h1>
      <svg width="32" height="32" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 9c0 3.9-3.6 7-8 7a9.3 9.3 0 01-3-.5L2 17l1.5-3.8A6.8 6.8 0 012 9c0-3.9 3.6-7 8-7s8 3.1 8 7z"/>
        <path d="M8 6.5a2 2 0 013.7 1c0 1.3-1.7 1.8-1.7 3"/>
        <circle cx="10" cy="12.5" r="0.6" fill="currentColor" stroke="none"/>
      </svg>
      PubQuiz
    </h1>
    <p>Wähle deine Rolle</p>
  </div>
  <div class="role-cards">
    <a href="/master.html" class="role-card">
      <div class="icon">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="8" y="2" width="6" height="10" rx="3"/>
          <path d="M5 10a6 6 0 0012 0"/>
          <line x1="11" y1="16" x2="11" y2="20"/>
          <line x1="7" y1="20" x2="15" y2="20"/>
        </svg>
      </div>
      <h2>Fragenmaster</h2>
      <p>Fragen erstellen, Spiel steuern, Lösungen aufdecken</p>
    </a>
    <a href="/player.html" class="role-card">
      <div class="icon">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="8" r="3.5"/>
          <path d="M3 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
        </svg>
      </div>
      <h2>Mitspieler</h2>
      <p>Fragen beantworten und mitspielen</p>
    </a>
  </div>
</div>

<script>
  const html   = document.documentElement;
  const stored = localStorage.getItem('pubquiz_theme') || 'dark';
  html.dataset.theme = stored;
  updateIcons(stored);
  document.getElementById('themeToggle').addEventListener('click', () => {
    const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
    html.dataset.theme = next;
    localStorage.setItem('pubquiz_theme', next);
    updateIcons(next);
  });
  function updateIcons(theme) {
    document.getElementById('iconSun').style.display  = theme === 'dark'  ? '' : 'none';
    document.getElementById('iconMoon').style.display = theme === 'light' ? '' : 'none';
  }
</script>
</body>
</html>
