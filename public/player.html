<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PubQuiz – Mitspielen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="logo">
    <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 9c0 3.9-3.6 7-8 7a9.3 9.3 0 01-3-.5L2 17l1.5-3.8A6.8 6.8 0 012 9c0-3.9 3.6-7 8-7s8 3.1 8 7z"/>
      <path d="M8 6.5a2 2 0 013.7 1c0 1.3-1.7 1.8-1.7 3"/>
      <circle cx="10" cy="12.5" r="0.6" fill="currentColor" stroke="none"/>
    </svg>
    PubQuiz
  </div>
  <span class="badge">Mitspieler</span>
  <div class="header-right">
    <span class="status-dot" id="statusDot"></span>
    <button class="theme-toggle" id="themeToggle" title="Theme wechseln">
      <svg id="iconSun" width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="7.5" cy="7.5" r="2.5"/>
        <line x1="7.5" y1="1" x2="7.5" y2="2.5"/><line x1="7.5" y1="12.5" x2="7.5" y2="14"/>
        <line x1="1" y1="7.5" x2="2.5" y2="7.5"/><line x1="12.5" y1="7.5" x2="14" y2="7.5"/>
        <line x1="3" y1="3" x2="4.1" y2="4.1"/><line x1="10.9" y1="10.9" x2="12" y2="12"/>
        <line x1="12" y1="3" x2="10.9" y2="4.1"/><line x1="4.1" y1="10.9" x2="3" y2="12"/>
      </svg>
      <svg id="iconMoon" width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <path d="M13 9.5a6 6 0 01-7.5-7.5A5.5 5.5 0 1013 9.5z" fill="currentColor" stroke="none"/>
      </svg>
    </button>
  </div>
</header>

<div class="container" style="max-width:620px;">

  <!-- Name -->
  <div id="nameScreen" class="card" style="margin-top:2rem;">
    <div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:1rem;">Wie heißt du?</div>
    <div class="flex gap-2">
      <input type="text" id="nameInput" placeholder="Dein Name" maxlength="30" style="flex:1;"
             onkeydown="if(event.key==='Enter')joinGame()">
      <button class="btn-primary" onclick="joinGame()">
        Mitspielen
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="1.5" y1="6" x2="10.5" y2="6"/><polyline points="6.5,2 10.5,6 6.5,10"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Spielbereich -->
  <div id="gameScreen" class="hidden">
    <div style="margin:1.25rem 0 1rem;font-size:0.82rem;color:var(--text-muted);display:flex;align-items:center;gap:0.4rem;">
      <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="7" cy="5" r="2.5"/><path d="M2 12c0-2.8 2.2-5 5-5s5 2.2 5 5"/>
      </svg>
      <strong id="playerNameDisplay" style="color:var(--text);"></strong>
    </div>

    <!-- Punktestand -->
    <div id="scoreboardWrapper" class="hidden" style="margin-bottom:1.5rem;">
      <div class="section-title">Punktestand</div>
      <div class="card" id="scoreboardPlayer"></div>
    </div>

    <!-- Warten -->
    <div id="waitingScreen" class="waiting">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
        <circle cx="20" cy="20" r="16"/>
        <polyline points="20,10 20,20 26,26"/>
      </svg>
      <h2>Warten auf den Fragenmaster</h2>
      <p>Die nächste Frage erscheint hier automatisch.</p>
    </div>

    <!-- Frage aktiv -->
    <div id="questionScreen" class="hidden">
      <div class="card">
        <img id="questionImage" class="question-image hidden" alt="Fragenbild">
        <div class="question-display" id="questionText"></div>

        <!-- Multiple Choice -->
        <div id="multipleChoiceArea" class="hidden">
          <div class="answer-grid" id="answersGrid"></div>
          <div id="confirmArea" class="hidden" style="margin-top:0.85rem;">
            <button class="btn-primary" onclick="confirmAnswer()" style="width:100%;justify-content:center;">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="1.5,6.5 5,10 11.5,3"/></svg>
              Antwort einloggen
            </button>
          </div>
        </div>

        <!-- Freitext -->
        <div id="freeTextArea" class="hidden">
          <div class="free-answer-area">
            <input type="text" id="freeTextInput" placeholder="Deine Antwort…" maxlength="200"
                   onkeydown="if(event.key==='Enter')submitFreeText()">
            <button class="btn-primary" onclick="submitFreeText()">Senden</button>
          </div>
        </div>

        <!-- Bestätigung -->
        <div id="answeredBadge" class="answered-badge hidden">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>
          Antwort abgeschickt
        </div>

        <!-- Lösung -->
        <div id="revealBanner" class="hidden">
          <div class="reveal-banner">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="7.5" cy="7.5" r="6"/><polyline points="4.5,7.5 6.5,9.5 10.5,5.5"/>
            </svg>
            <span id="revealBannerText"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Theme ──
(function() {
  const s = localStorage.getItem('pubquiz_theme') || 'dark';
  document.documentElement.dataset.theme = s;
  updateIcons(s);
})();
document.getElementById('themeToggle').addEventListener('click', () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('pubquiz_theme', next);
  updateIcons(next);
});
function updateIcons(t) {
  document.getElementById('iconSun').style.display  = t === 'dark'  ? '' : 'none';
  document.getElementById('iconMoon').style.display = t === 'light' ? '' : 'none';
}

// ── State ──
let playerId = localStorage.getItem('pubquiz_player_id') || crypto.randomUUID();
localStorage.setItem('pubquiz_player_id', playerId);
let playerName = '', currentQuestion = null, myAnswer = null, pendingAnswer = null, ws = null, gameState = null;

function renderScoreboard() {
  const scores  = gameState && gameState.scores ? gameState.scores : {};
  const entries = Object.values(scores).sort((a, b) => b.points - a.points);
  const wrapper = document.getElementById('scoreboardWrapper');
  const el      = document.getElementById('scoreboardPlayer');
  if (!entries.length) { wrapper.classList.add('hidden'); return; }
  wrapper.classList.remove('hidden');
  el.innerHTML = `<table class="answers-table"><thead><tr><th>#</th><th>Spieler</th><th>Punkte</th></tr></thead><tbody>
    ${entries.map((e,i) => `<tr>
      <td style="color:var(--text-muted);font-size:0.82rem;">${i+1}</td>
      <td>${esc(e.name)}</td>
      <td style="font-weight:600;color:var(--success);">${e.points}</td>
    </tr>`).join('')}</tbody></table>`;
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen  = () => { setStatus(true); if (playerName) send({ type: 'player_join', playerId, playerName }); };
  ws.onclose = () => { setStatus(false); setTimeout(connectWS, 2000); };
  ws.onerror = () => setStatus(false);
  ws.onmessage = (e) => { const msg = JSON.parse(e.data); if (msg.type === 'game_update') { handleGameUpdate(msg); renderScoreboard(); } };
}
function setStatus(ok) { document.getElementById('statusDot').className = 'status-dot ' + (ok ? 'connected' : 'disconnected'); }
function send(obj) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); }

function joinGame() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { document.getElementById('nameInput').focus(); return; }
  playerName = name;
  document.getElementById('nameScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  document.getElementById('playerNameDisplay').textContent = playerName;
  send({ type: 'player_join', playerId, playerName });
  if (gameState) applyGameState(gameState);
}

function handleGameUpdate(msg) {
  gameState = msg;
  const newQId = msg.activeQuestion ? msg.activeQuestion.id : null;
  const oldQId = currentQuestion ? currentQuestion.id : null;
  if (newQId !== oldQId) {
    myAnswer = null; pendingAnswer = null;
    const fti = document.getElementById('freeTextInput');
    if (fti) fti.value = '';
  }
  currentQuestion = msg.activeQuestion;
  if (playerName) applyGameState(msg);
}

function applyGameState(msg) {
  const q = msg.activeQuestion;
  if (!q) { showWaiting(); return; }
  document.getElementById('waitingScreen').classList.add('hidden');
  document.getElementById('questionScreen').classList.remove('hidden');
  const imgEl = document.getElementById('questionImage');
  if (q.image) { imgEl.src = q.image; imgEl.classList.remove('hidden'); } else imgEl.classList.add('hidden');
  document.getElementById('questionText').textContent = q.text;
  const hasOptions = q.options && q.options.length > 0;
  document.getElementById('multipleChoiceArea').classList.toggle('hidden', !hasOptions);
  document.getElementById('freeTextArea').classList.toggle('hidden', hasOptions);
  if (hasOptions) renderOptions(q, msg.showAnswer); else renderFreeText(msg.showAnswer);
  const bannerEl = document.getElementById('revealBanner');
  const bannerText = document.getElementById('revealBannerText');
  if (msg.showAnswer && q.correctAnswer !== null && q.correctAnswer !== undefined) {
    const correctText = q.options && q.options.length ? q.options[q.correctAnswer] : String(q.correctAnswer);
    bannerText.textContent = `Richtige Antwort: ${correctText}`;
    bannerEl.classList.remove('hidden');
  } else if (msg.showAnswer && q.correctAnswerText) {
    const myAnswered = myAnswer !== null;
    const myCorrect  = myAnswered && String(myAnswer).toLowerCase().trim() === String(q.correctAnswerText).toLowerCase().trim();
    bannerText.textContent = (myAnswered ? (myCorrect ? 'Richtig — ' : 'Falsch — ') : '') + `Richtige Antwort: ${q.correctAnswerText}`;
    bannerEl.classList.remove('hidden');
  } else if (msg.showAnswer) {
    bannerText.textContent = 'Der Fragenmaster hat die Antworten aufgedeckt.';
    bannerEl.classList.remove('hidden');
  } else {
    bannerEl.classList.add('hidden');
  }
}

function showWaiting() {
  document.getElementById('waitingScreen').classList.remove('hidden');
  document.getElementById('questionScreen').classList.add('hidden');
}

function renderOptions(q, showAnswer) {
  const letters  = ['A','B','C','D'];
  const answered = myAnswer !== null;
  document.getElementById('answersGrid').innerHTML = q.options.map((opt, i) => {
    let cls = 'answer-btn';
    if (answered && String(myAnswer) === String(i)) cls += ' selected';
    else if (!answered && pendingAnswer !== null && String(pendingAnswer) === String(i)) cls += ' selected';
    if (showAnswer) {
      if (i === q.correctAnswer) cls += ' correct-reveal';
      else if (answered && String(myAnswer) === String(i)) cls += ' wrong-reveal';
    }
    return `<button class="${cls}" onclick="selectOption(${i})" ${answered||showAnswer?'disabled':''}>
      <span class="letter">${letters[i]}</span><span>${esc(opt)}</span>
    </button>`;
  }).join('');
  document.getElementById('answeredBadge').classList.toggle('hidden', !answered);
  document.getElementById('confirmArea').classList.toggle('hidden', answered || pendingAnswer === null || showAnswer);
}

function renderFreeText(showAnswer) {
  const answered = myAnswer !== null;
  document.getElementById('freeTextInput').disabled = answered || showAnswer;
  document.getElementById('answeredBadge').classList.toggle('hidden', !answered);
  if (answered) document.getElementById('freeTextInput').value = myAnswer;
}

function selectOption(idx) {
  if (myAnswer !== null) return;
  pendingAnswer = idx;
  if (currentQuestion) renderOptions(currentQuestion, gameState ? gameState.showAnswer : false);
}

function confirmAnswer() {
  if (myAnswer !== null || pendingAnswer === null) return;
  myAnswer = pendingAnswer;
  send({ type: 'player_answer', playerId, playerName, answer: myAnswer });
  if (currentQuestion) renderOptions(currentQuestion, gameState ? gameState.showAnswer : false);
}

function submitFreeText() {
  const val = document.getElementById('freeTextInput').value.trim();
  if (!val || myAnswer !== null) return;
  myAnswer = val;
  send({ type: 'player_answer', playerId, playerName, answer: val });
  document.getElementById('freeTextInput').disabled = true;
  document.getElementById('answeredBadge').classList.remove('hidden');
}

function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

connectWS();
const savedName = localStorage.getItem('pubquiz_player_name');
if (savedName) document.getElementById('nameInput').value = savedName;
document.getElementById('nameInput').addEventListener('input', e => localStorage.setItem('pubquiz_player_name', e.target.value));
</script>
</body>
</html>
